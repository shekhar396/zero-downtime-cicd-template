# Example service registry for no-Docker Linux VM deployments using systemd.
# Port roles: public_port is the external Apache/NGINX proxy port; blue_port and green_port are application ports.
# Copy the shape into config/services.yml and replace values for your service.
services:
  - service_name: billing-api
    runtime: systemd
    public_port: 8080
    blue_port: 8860
    green_port: 8861
    health_path: /api/v1/health
    deploy_path: /opt/apps/billing-api
    nginx_server_name: _
    retention_count: 5
    start_command: sudo systemctl start billing-api-{color}
    stop_command: sudo systemctl stop billing-api-{color}
    status_command: sudo systemctl is-active billing-api-{color}
    working_directory: /opt/apps/billing-api/current/artifact
    env_file: /opt/apps/billing-api/shared/.env
    executable: bin/billing-api
    user: billing-api
    group: billing-api

