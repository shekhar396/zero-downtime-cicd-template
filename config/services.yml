services:
  - service_name: pico-photos-api
    runtime: systemd
    proxy_runtime: apache
    public_port: 80
    blue_port: 8860
    green_port: 8861
    health_path: /api/v1/test
    deploy_path: /opt/apps/pico-photos-api
    nginx_server_name: _
    retention_count: 5
    start_command: sudo -n systemctl start pico-photos-api-{color}
    stop_command: sudo -n systemctl stop pico-photos-api-{color}
    status_command: sudo -n systemctl is-active pico-photos-api-{color}
    env_file: /opt/apps/pico-photos-api/shared/.env